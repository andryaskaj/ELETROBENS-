<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELETROBENS - A escolha simples e certa</title>
    <style>
        :root {
            --cor-principal: #d32f2f; 
            --cor-fundo: #f4f4f4; 
            --cor-card: #ffffff;
            --cor-texto: #333333;
            --cor-wpp: #25d366;
            --cor-destaque: #004a99; /* Azul para Entrega/Montagem */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--cor-fundo); 
            margin: 0; 
            padding: 0; 
            color: var(--cor-texto);
        }

        /* --- Logo Digitalizada --- */
        header { 
            text-align: center; 
            padding: 40px 20px 20px 20px; 
            background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 100%);
            color: white; 
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            background-color: #000000; 
            padding: 12px 30px;
            border: 4px solid #ffffff; 
            border-radius: 4px; 
            margin-bottom: 10px;
        }

        .logo-texto {
            font-size: 2.8em;
            font-weight: 900;
            color: #d32f2f; 
            letter-spacing: -1px;
            text-transform: uppercase;
            margin: 0;
        }

        header p { margin: 5px 0 0; font-style: italic; opacity: 0.9; }

        /* --- Banner de Serviços --- */
        .banner-servicos {
            background-color: var(--cor-destaque);
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 1.1em;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- Vitrine --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .vitrine { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        
        .produto-card { 
            background: var(--cor-card); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            text-align: center; 
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .produto-card:hover { transform: translateY(-5px); }

        /* Estilização das Imagens dos Produtos */
        .img-container {
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background: #fff;
            border-radius: 8px;
        }

        .produto-card img { 
            max-width: 100%; 
            max-height: 100%;
            object-fit: contain;
        }

        .produto-card h3 { font-size: 1.1em; color: #444; height: 50px; margin: 10px 0; }

        .preco { 
            font-size: 1.8em; 
            color: var(--cor-principal); 
            font-weight: 800; 
            margin: 5px 0;
        }

        .selo-gratis {
            color: var(--cor-destaque);
            font-size: 0.85em;
            font-weight: bold;
            background: #e7f0f8;
            padding: 5px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .btn-comprar { 
            background-color: var(--cor-wpp); 
            color: white; 
            padding: 14px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            margin-top: auto;
        }

        footer { text-align: center; padding: 40px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <h1 class="logo-texto">ELETROBENS</h1>
    </div>
    <p>A escolha simples e certa.</p>
</header>

<div class="banner-servicos">
    🚚 ENTREGA E MONTAGEM 100% GRATUITA EM TODA REGIÃO! 🛠️
</div>

<div class="container">
    <section class="vitrine" id="lista-produtos"></section>
</div>

<footer>
    &copy; 2026 ELETROBENS - A escolha simples e certa.
</footer>

<script>
    const produtos = [
        { 
            nome: "Geladeira Frost Free 400L Inox", 
            preco: "3.299,00", 
            img: "https://images.unsplash.com/photo-1571175432291-6a5f577ec6ba?auto=format&fit=crop&w=400&q=80" 
        },
        { 
            nome: "Smart TV LED 50\" 4K UHD", 
            preco: "2.450,00", 
            img: "https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?auto=format&fit=crop&w=400&q=80" 
        },
        { 
            nome: "Micro-ondas 30L Inox", 
            preco: "680,00", 
            img: "https://images.unsplash.com/photo-1574269909862-7e1d70bb8078?auto=format&fit=crop&w=400&q=80" 
        },
        { 
            nome: "Fogão 5 Bocas Automático", 
            preco: "1.150,00", 
            img: "https://images.unsplash.com/photo-1522069394015-ef6623696773?auto=format&fit=crop&w=400&q=80" 
        },
        { 
            nome: "Fritadeira Air Fryer Digital", 
            preco: "459,90", 
            img: "https://images.unsplash.com/photo-1626074353765-517a681e40be?auto=format&fit=crop&w=400&q=80" 
        },
        { 
            nome: "Máquina de Lavar 12kg", 
            preco: "1.890,00", 
            img: "https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?auto=format&fit=crop&w=400&q=80" 
        },
        { 
            nome: "Smartphone 128GB Pro", 
            preco: "1.999,00", 
            img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=400&q=80" 
        },
        { 
            nome: "Batedeira Planetária", 
            preco: "540,00", 
            img: "https://images.unsplash.com/photo-1594385208974-2e75f9d8ad48?auto=format&fit=crop&w=400&q=80" 
        }
    ];

    const lista = document.getElementById('lista-produtos');

    produtos.forEach(p => {
        lista.innerHTML += `
            <div class="produto-card">
                <div class="img-container">
                    <img src="${p.img}" alt="${p.nome}">
                </div>
                <h3>${p.nome}</h3>
                <p class="preco">R$ ${p.preco}</p>
                <div class="selo-gratis">✅ Entrega e Montagem Grátis</div>
                <a href="#" class="btn-comprar" onclick="enviarWhatsapp('${p.nome}', '${p.preco}')">Comprar via WhatsApp</a>
            </div>
        `;
    });

    function enviarWhatsapp(nome, preco) {
        const tel = "5548988635507";
        const msg = encodeURIComponent(`Olá ELETROBENS! Quero garantir meu ${nome} por R$ ${preco}. Com entrega e montagem gratuita!`);
        window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${msg}`, '_blank');
    }
</script>

</body>
</html>
